<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Acessos</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      position: sticky;
      top: 0;
      background: #020617;
      padding: 15px;
      border-bottom: 1px solid #334155;
      z-index: 10;
    }

    h1 {
      font-size: 18px;
      margin: 0;
    }

    #total {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 5px;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #334155;
    }

    .data {
      font-size: 14px;
      margin-bottom: 5px;
    }

    .small {
      color: #94a3b8;
      font-size: 11px;
      word-break: break-all;
    }

    .device {
      margin-top: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>📊 Acessos ao Link Antigo</h1>
  <div id="total">Carregando...</div>
</header>

<div class="container">
  <div id="lista"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAiwLZG2g_3S7pLkdXQtYqz14rTgd1FPOg",
  authDomain: "meudiario-59cba.firebaseapp.com",
  databaseURL: "https://meudiario-59cba-default-rtdb.firebaseio.com",
  projectId: "meudiario-59cba",
  storageBucket: "meudiario-59cba.firebasestorage.app",
  messagingSenderId: "426502564208",
  appId: "1:426502564208:web:07839ac5ffd480f95547b5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const lista = document.getElementById("lista");
const totalDiv = document.getElementById("total");

db.ref("acessos_antigos").on("value", (snapshot) => {
  lista.innerHTML = "";

  let total = 0;

  snapshot.forEach((child) => {
    total++;

    const data = child.val();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="data">📅 ${data.data || "—"}</div>
      <div class="small">⏱️ ${data.timestamp || ""}</div>
      <div class="small device">📱 ${data.dispositivo}</div>
    `;

    lista.prepend(div);
  });

  totalDiv.innerText = `Total: ${total} acessos`;
});
</script>

</body>
</html>
