<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel PRO</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      position: sticky;
      top: 0;
      background: #020617;
      padding: 15px;
      border-bottom: 1px solid #334155;
    }

    h1 {
      font-size: 18px;
      margin: 0;
    }

    #total {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 5px;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #334155;
    }

    .tag {
      font-size: 10px;
      background: #334155;
      padding: 2px 6px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 5px;
    }

    .data {
      font-size: 14px;
    }

    .small {
      color: #94a3b8;
      font-size: 11px;
      word-break: break-all;
    }
  </style>
</head>

<body>

<header>
  <h1>📊 Painel PRO</h1>
  <div id="total">Carregando...</div>
</header>

<div class="container">
  <div id="lista"></div>
</div>

<script>
// 🔹 Firebase Realtime
const app1 = firebase.initializeApp({
  apiKey: "AIzaSyAiwLZG2g_3S7pLkdXQtYqz14rTgd1FPOg",
  authDomain: "meudiario-59cba.firebaseapp.com",
  databaseURL: "https://meudiario-59cba-default-rtdb.firebaseio.com",
  projectId: "meudiario-59cba"
}, "app1");

const db1 = app1.database();

// 🔹 Firebase Firestore
const app2 = firebase.initializeApp({
  apiKey: "AIzaSyAgN8SgLnyTJFTcTmKFla6TbqL3Bki2rak",
  authDomain: "peye-22c34.firebaseapp.com",
  projectId: "peye-22c34"
}, "app2");

const db2 = app2.firestore();

const lista = document.getElementById("lista");
const totalDiv = document.getElementById("total");

let registros = [];

// 🔥 PARSE UNIVERSAL (ANTI BUG)
function parseData(data, timestamp) {
  try {
    // prioridade: timestamp
    if (timestamp) return new Date(timestamp);

    if (!data) return null;

    // ISO
    if (typeof data === "string" && data.includes("T")) {
      return new Date(data);
    }

    // BR
    if (typeof data === "string") {
      const partes = data.split(" ");
      const [dia, mes, ano] = partes[0].split("/");

      let hora = "00:00:00";

      if (partes[1]) {
        hora = partes[1];
        if (hora.length === 5) hora += ":00";
      }

      return new Date(`${ano}-${mes}-${dia}T${hora}`);
    }

    return null;

  } catch {
    return null;
  }
}

// 🔥 TEMPO RELATIVO
function tempoRelativo(data, timestamp) {
  const d = parseData(data, timestamp);
  if (!d || isNaN(d)) return "sem data";

  const diff = (Date.now() - d) / 1000;

  if (diff < 60) return "agora";
  if (diff < 3600) return Math.floor(diff / 60) + " min atrás";
  if (diff < 86400) return Math.floor(diff / 3600) + "h atrás";

  return d.toLocaleDateString("pt-BR");
}

// 🔥 DISPOSITIVO
function tipoDispositivo(ua) {
  if (!ua) return "Desconhecido";
  return /mobile/i.test(ua) ? "📱 Celular" : "💻 PC";
}

// 🔥 RENDER
function renderTudo() {
  lista.innerHTML = "";

  registros
    .sort((a, b) => {
      const da = parseData(a.data, a.timestamp)?.getTime() || 0;
      const db = parseData(b.data, b.timestamp)?.getTime() || 0;
      return db - da;
    })
    .forEach((item) => {
      const div = document.createElement("div");
      div.className = "card";

      const d = parseData(item.data, item.timestamp);
      const dataFormatada = d && !isNaN(d)
        ? d.toLocaleString("pt-BR")
        : "sem data";

      div.innerHTML = `
        <div class="tag">${item.origem}</div>
        <div class="data">
          📅 ${tempoRelativo(item.data, item.timestamp)}
          <span class="small">(${dataFormatada})</span>
        </div>
        <div class="small">${tipoDispositivo(item.dispositivo)}</div>
      `;

      lista.appendChild(div);
    });

  totalDiv.innerText = `Total: ${registros.length} acessos`;
}

// 🔹 Realtime DB
db1.ref("acessos_antigos").on("child_added", (snap) => {
  registros.push({
    ...snap.val(),
    origem: "lar-data"
  });

  renderTudo();
});

// 🔹 Firestore
db2.collection("acessos_eye").onSnapshot((snapshot) => {
  snapshot.docChanges().forEach((change) => {
    if (change.type === "added") {
      registros.push({
        ...change.doc.data(),
        origem: "perfect-eye"
      });

      renderTudo();
    }
  });
});

// 🔥 Atualiza tempo sozinho
setInterval(() => {
  renderTudo();
}, 30000);
</script>

</body>
</html>
