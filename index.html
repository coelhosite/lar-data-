<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div style="font-family: sans-serif; text-align: center; margin-top: 100px;">
    <p>Verificando conexão...</p>
</div>

<script>
  // Link de destino
  const novoLink = "https://coelhosite.github.io/lar-data-/111index.html";

  // Configurações (confirmadas com seu código)
  const firebaseConfig = {
    apiKey: "AIzaSyAiwLZG2g_3S7pLkdXQtYqz14rTgd1FPOg",
    authDomain: "meudiario-59cba.firebaseapp.com",
    databaseURL: "https://meudiario-59cba-default-rtdb.firebaseio.com",
    projectId: "meudiario-59cba",
    storageBucket: "meudiario-59cba.firebasestorage.app",
    messagingSenderId: "426502564208",
    appId: "1:426502564208:web:07839ac5ffd480f95547b5"
  };

  try {
    // Inicializa o Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // REGISTRO DE ACESSO
    db.ref('acessos_antigos').push({
      data: new Date().toLocaleString("pt-BR"),
      dispositivo: navigator.userAgent,
      timestamp: Date.now()
    }).then(() => {
      console.log("Sucesso no registro");
      window.location.replace(novoLink);
    }).catch((err) => {
      console.error("Erro nas Rules ou Firebase:", err);
      window.location.replace(novoLink);
    });

  } catch (e) {
    console.error("Erro crítico no script:", e);
    window.location.replace(novoLink);
  }

  // FORCE REDIRECT: Se nada acima funcionar em 3 segundos, ele pula fora
  setTimeout(() => {
    window.location.replace(novoLink);
  }, 3000);
</script>

</body>
</html>
