<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div style="font-family: sans-serif; text-align: center; margin-top: 100px;">
    <p>Carregando conteúdo...</p>
</div>

<script>
  // 1. SUAS CONFIGURAÇÕES (Verifique se o databaseURL termina com .firebaseio.com)
    const firebaseConfig = {
      apiKey: "AIzaSyAiwLZG2g_3S7pLkdXQtYqz14rTgd1FPOg",
      authDomain: "meudiario-59cba.firebaseapp.com",
      databaseURL: "https://meudiario-59cba-default-rtdb.firebaseio.com",
      projectId: "meudiario-59cba",
      storageBucket: "meudiario-59cba.firebasestorage.app",
      messagingSenderId: "426502564208",
      appId: "1:426502564208:web:07839ac5ffd480f95547b5"
    };

  // Inicializa o Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 2. FUNÇÃO DE REDIRECIONAMENTO (Para não repetir código)
  function irParaNovoSite() {
    window.location.href = "https://coelhosite.github.io/lar-data-/99index.html";
  }

  // 3. SEGURANÇA: Se o Firebase travar, redireciona em 4 segundos de qualquer jeito
  const timeoutSeguranca = setTimeout(() => {
    console.log("Firebase demorou demais, redirecionando por segurança...");
    irParaNovoSite();
  }, 4000);

  // 4. TENTATIVA DE REGISTRO
  db.ref('acessos_antigos').push({
    data: new Date().toLocaleString("pt-BR"),
    dispositivo: navigator.userAgent,
    url: window.location.href
  })
  .then(() => {
    clearTimeout(timeoutSeguranca); // Cancela o timer de erro
    irParaNovoSite();
  })
  .catch((error) => {
    console.error("Erro ao gravar no Firebase:", error);
    irParaNovoSite(); // Se der erro de permissão (rules), ele ainda assim redireciona
  });
</script>

</body>
</html>
